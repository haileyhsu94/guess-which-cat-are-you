<style>
  :root {
    --amber: #ffb000;
    --amber-bright: #ffd35c;
    --amber-dim: #8f6510;
    --green: #63e07c;
    --alert: #ff5a3c;
    --screen: #161003;
    --bezel: #cbc0a8;
    --bezel-dark: #9c9077;
    --bezel-edge: #6e6450;
    --room: #0d0b08;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "VT323", "Courier New", monospace;
    background: radial-gradient(ellipse at 50% 30%, #191b1e 0%, #0a0b0d 70%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 28px 14px;
    color: var(--amber);
  }

  /* ================= chassis: instrument panel ================= */
  .chassis {
    width: 100%; max-width: 620px;
    background: linear-gradient(160deg, #6a7076 0%, #2c2f32 60%, #45494e 100%);
    clip-path: polygon(26px 0, calc(100% - 26px) 0, 100% 26px,
      100% calc(100% - 26px), calc(100% - 26px) 100%, 26px 100%,
      0 calc(100% - 26px), 0 26px);
    padding: 3px;
    filter: drop-shadow(0 24px 40px rgba(0,0,0,.7));
  }
  .panel {
    position: relative;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.022) 0 1px, transparent 1px 3px),
      linear-gradient(175deg, #3d4145 0%, #24272a 100%);
    clip-path: polygon(24px 0, calc(100% - 24px) 0, 100% 24px,
      100% calc(100% - 24px), calc(100% - 24px) 100%, 24px 100%,
      0 calc(100% - 24px), 0 24px);
    padding: 24px 24px 16px;
  }

  .screw {
    position: absolute; width: 15px; height: 15px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #838a90, #3a3e42 60%, #16181a);
    box-shadow: inset 0 -1px 2px rgba(0,0,0,.65), 0 1px 1px rgba(255,255,255,.08);
  }
  .screw::after {
    content: ""; position: absolute; left: 2px; right: 2px; top: 50%;
    height: 2px; margin-top: -1px; background: #101214; border-radius: 1px;
  }
  .screw.tl { top: 16px; left: 16px; } .screw.tl::after { transform: rotate(45deg); }
  .screw.tr { top: 16px; right: 16px; } .screw.tr::after { transform: rotate(-28deg); }
  .screw.bl { bottom: 16px; left: 16px; } .screw.bl::after { transform: rotate(8deg); }
  .screw.br { bottom: 16px; right: 16px; } .screw.br::after { transform: rotate(72deg); }

  .chassis-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding: 0 18px;
  }
  .nameplate {
    font-family: "Michroma", sans-serif;
    font-size: 13px; letter-spacing: 2px; color: #c3c9ce;
    text-shadow: 0 1px 0 rgba(0,0,0,.7);
  }
  .nameplate small { display: block; font-size: 8px; letter-spacing: 3px; color: #7d838a; margin-top: 3px; }
  .lights { display: flex; gap: 8px; }
  .lamp { width: 10px; height: 10px; border-radius: 50%; box-shadow: inset 0 1px 2px rgba(0,0,0,.5); }
  .lamp.on  { background: var(--green); box-shadow: 0 0 8px var(--green); animation: lampblink 2.4s steps(1) infinite; }
  .lamp.amb { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .lamp.off { background: #5c5240; animation: none; }
  .lamp.red { background: var(--alert); box-shadow: 0 0 10px var(--alert); animation: lampblink .3s steps(1) infinite; }
  @keyframes lampblink { 0%,80%,100% { opacity: 1; } 90% { opacity: .25; } }

  /* ================= CRT ================= */
  .crt {
    position: relative;
    background:
      radial-gradient(ellipse at center, rgba(255,176,0,.06) 0%, rgba(0,0,0,0) 65%),
      var(--screen);
    border-radius: 18px / 26px;
    border: 3px solid #241d10;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,.85),
      inset 0 0 14px rgba(255,176,0,.12);
    padding: 30px 28px 34px;
    min-height: 480px;
    overflow: hidden;
  }
  /* scanlines + vignette */
  .crt::before {
    content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 3;
    background: repeating-linear-gradient(0deg,
      rgba(0,0,0,.28) 0px, rgba(0,0,0,.28) 1px,
      transparent 1px, transparent 3px);
    border-radius: inherit;
  }
  .crt::after {
    content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 4;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.5) 100%);
    border-radius: inherit;
  }
  .crt-inner { position: relative; z-index: 2; animation: flicker 4s steps(1) infinite; }
  @keyframes flicker { 0%,93%,100% { opacity: 1; } 94% { opacity: .93; } 95% { opacity: 1; } 97% { opacity: .96; } }

  /* chaos knob tiers */
  .crt[data-chaos="0"] .crt-inner { animation: none; }
  .crt[data-chaos="2"] .crt-inner { animation: flicker 1.4s steps(1) infinite, jitter .38s steps(2) infinite; }
  @keyframes jitter {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(-1px, 1px) skewX(.4deg); }
    50% { transform: translate(1px, -1px); }
    75% { transform: translate(-1px, 0) skewX(-.4deg); }
  }

  /* signal disturbance when a paw hits the hardware */
  .crt.glitch .crt-inner { animation: signal-unstable .6s linear both; }
  @keyframes signal-unstable {
    0%   { transform: translateX(-7px) skewX(-5deg) scaleY(1.03); filter: brightness(1.9); }
    12%  { transform: translateX(6px) skewX(4deg); filter: brightness(.6); }
    28%  { transform: translateX(-4px) scaleY(.97); filter: brightness(1.5); }
    42%  { transform: translateX(8px) skewX(-3deg); filter: brightness(.85); }
    58%  { transform: translateX(-3px) skewX(1.5deg); filter: brightness(1.25); }
    74%  { transform: translateX(2px); filter: brightness(.95); }
    100% { transform: none; filter: none; }
  }
  .rollband {
    position: absolute; left: 0; right: 0; height: 64px; top: -20%;
    z-index: 5; pointer-events: none; opacity: 0;
    background: linear-gradient(180deg, transparent,
      rgba(255, 214, 150, .12) 35%, rgba(255, 244, 220, .26) 50%,
      rgba(255, 214, 150, .12) 65%, transparent);
  }
  .crt.glitch .rollband { animation: rollband .6s linear both; }
  @keyframes rollband {
    0%   { top: -20%; opacity: 1; }
    100% { top: 115%; opacity: 1; }
  }

  /* power-off shutter */
  .tube {
    position: absolute; inset: 0; z-index: 6; background: #000;
    transform: scaleY(0); transform-origin: center;
    transition: transform .22s cubic-bezier(.7, 0, 1, .4);
    pointer-events: none; border-radius: inherit;
  }
  .crt.off .tube { transform: scaleY(1); }
  .crt.off .crt-inner { pointer-events: none; }

  /* dog mode alert */
  .dogalert {
    position: absolute; inset: 0; z-index: 7;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; padding: 20px; text-align: center;
    background: rgba(46, 4, 0, .94);
    animation: lampblink .5s steps(1) infinite;
  }
  .dogalert .line { font-size: 24px; }

  /* the arm of power restoration */
  .pawpress {
    position: absolute; left: -20px; bottom: -165px; z-index: 10;
    width: 124px; pointer-events: none;
    filter: drop-shadow(-6px 8px 12px rgba(0,0,0,.55));
    transform: translateY(110%);
    animation: pawpress 1.6s cubic-bezier(.45, 0, .3, 1) forwards;
  }
  @keyframes pawpress {
    0%   { transform: translateY(110%) rotate(4deg); }
    27%  { transform: translateY(1.5%) rotate(-2deg); }
    31%  { transform: translateY(0) rotate(-1deg); }
    60%  { transform: translateY(1%) rotate(-1deg); }
    100% { transform: translateY(112%) rotate(6deg); }
  }

  /* laser pointer module */
  .laser-dot {
    position: absolute; z-index: 2; width: 11px; height: 11px; border-radius: 50%;
    background: #ff2a1a; pointer-events: none;
    box-shadow: 0 0 10px 4px rgba(255, 42, 26, .85), 0 0 34px 12px rgba(255, 42, 26, .3);
    transition: left .55s cubic-bezier(.25, .9, .35, 1), top .55s cubic-bezier(.25, .9, .35, 1);
  }

  /* share transmission menu */
  .sharemenu {
    position: absolute; inset: 0; z-index: 7;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; padding: 24px;
    background: rgba(12, 8, 1, .97);
  }
  .sharemenu .line { margin-bottom: 10px; }
  .sharemenu .term-btn { width: min(320px, 100%); text-align: left; font-size: 19px; }

  .glow { text-shadow: 0 0 6px rgba(255,176,0,.75), 0 0 20px rgba(255,176,0,.25); }
  .green { color: var(--green); text-shadow: 0 0 6px rgba(99,224,124,.7); }
  .alert { color: var(--alert); text-shadow: 0 0 8px rgba(255,90,60,.7); }
  .dim { color: var(--amber-dim); text-shadow: none; }

  .line { font-size: 21px; line-height: 1.5; letter-spacing: .5px; }
  .cursor::after { content: "█"; animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* ================= controls ================= */
  .term-btn {
    display: block; width: 100%; text-align: left;
    font: inherit; font-size: 21px; letter-spacing: .5px;
    color: var(--amber);
    background: transparent;
    border: 1px solid var(--amber-dim);
    padding: 10px 14px; margin-top: 10px;
    cursor: pointer;
    text-shadow: 0 0 6px rgba(255,176,0,.5);
    transition: background .08s, color .08s;
  }
  .term-btn:hover, .term-btn:focus-visible {
    background: var(--amber); color: var(--screen); text-shadow: none;
    outline: none; box-shadow: 0 0 18px rgba(255,176,0,.55);
  }
  .term-btn .key { color: var(--green); margin-right: 10px; }
  .term-btn:hover .key, .term-btn:focus-visible .key { color: var(--screen); text-shadow: none; }

  .cta { text-align: center; margin-top: 26px; }
  .cta .term-btn { display: inline-block; width: auto; text-align: center; font-size: 24px; padding: 12px 34px; border-width: 2px; }

  /* ================= quiz header ================= */
  .readout { display: flex; justify-content: space-between; font-size: 18px; margin-bottom: 6px; }
  .blocks { letter-spacing: 2px; }
  .divider { border: none; border-top: 1px dashed var(--amber-dim); margin: 14px 0 20px; }
  .query { font-size: 26px; line-height: 1.4; margin-bottom: 18px; }
  .query .prompt { color: var(--green); text-shadow: 0 0 6px rgba(99,224,124,.7); }

  /* ================= result ================= */

  .feed-frame { position: relative; aspect-ratio: 4 / 3; background: #000; overflow: hidden; }

const screen = document.getElementById("screen");
const toast = document.getElementById("toast");
const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
let scores = {};
let current = 0;

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2400);
}

/* type lines one by one into a container; returns a promise */
function typeLines(container, lines, speed = 14) {
  return new Promise(resolve => {
    if (reducedMotion) {
      container.innerHTML = lines.map(l => `<div class="line ${l.cls || ""}">${l.text}</div>`).join("");
      resolve();
      return;
    }
    let li = 0;
    function nextLine() {
      if (li >= lines.length) { resolve(); return; }
      const l = lines[li];
      const div = document.createElement("div");
      div.className = "line " + (l.cls || "");
      container.appendChild(div);
      let ci = 0;
      const plain = l.text;
      const timer = setInterval(() => {
        ci++;
        div.textContent = plain.slice(0, ci);
        if (ci >= plain.length) {
          clearInterval(timer);
          li++;
          setTimeout(nextLine, l.pause || 120);
        }
      }, speed);
    }
    nextLine();
  });
}

async function renderIntro() {

function startQuiz() {
  scores = {};
  for (const key in CATS) scores[key] = 0;
  current = 0;
  renderQuestion();
}

function blocks() {
  const done = "▓".repeat(current + 1);
  const todo = "░".repeat(QUESTIONS.length - current - 1);
  return `<span class="green">${done}</span><span class="dim">${todo}</span>`;
}

function renderQuestion() {
  const q = QUESTIONS[current];
  const keys = ["A", "B", "C", "D"];
  screen.innerHTML = `
    <div class="readout">
      <span class="dim">QUERY ${String(current + 1).padStart(2, "0")}/0${QUESTIONS.length}</span>
      <span class="blocks">${blocks()}</span>
    </div>
    <hr class="divider">
    <div class="query"><span class="prompt">&gt;&gt;</span> ${q.q}</div>
    <div class="answers">
      ${q.a.map((ans, i) =>
        `<button class="term-btn" data-i="${i}"><span class="key">[${keys[i]}]</span>${ans.t}</button>`
      ).join("")}
    </div>`;
  screen.querySelectorAll(".answers button").forEach(btn => {
    btn.onclick = () => {
      QUESTIONS[current].a[btn.dataset.i].s.forEach(key => scores[key]++);
      current++;
      current < QUESTIONS.length ? renderQuestion() : renderAnalyzing();
    };
  });
}

async function renderAnalyzing() {
  screen.innerHTML = `<div id="analysis"></div>`;

    { text: "COUNTING BRAIN CELLS.............. 1(?)", cls: "dim", pause: 260 },
    { text: "CROSS-REFERENCING FOLKLORE DB..... DONE", cls: "dim", pause: 300 },
    { text: "CLASSIFICATION LOCKED.", cls: "green", pause: 350 }
  ], 10);
  renderResult();
}

function pickWinner() {
  const tally = { ...scores };
  if (chaos >= .9) ["orange", "tortie", "sphynx"].forEach(k => tally[k]++);
  const max = Math.max(...Object.values(tally));
  const winners = Object.keys(tally).filter(k => tally[k] === max);
  return winners[Math.floor(Math.random() * winners.length)];
}

function renderResult() {
  const key = pickWinner();

function loadPhoto(cat) {
  const frame = document.getElementById("frame");
  if (!frame) return;
  let img = document.getElementById("cat-photo");
  frame.querySelector(".fallback")?.remove();
  if (!img) {
    frame.insertAdjacentHTML("beforeend", `<img id="cat-photo" crossorigin="anonymous" alt="A real ${cat.name.toLowerCase()}" style="opacity:0">`);
    img = document.getElementById("cat-photo");
  }
  frame.querySelector(".loading")?.remove();
  frame.insertAdjacentHTML("afterbegin", `<div class="loading">ACQUIRING SIGNAL<span class="cursor"></span></div>`);
  img.style.opacity = 0;
  img.onload = () => { frame.querySelector(".loading")?.remove(); img.style.opacity = 1; };
  img.onerror = () => {
    frame.querySelector(".loading")?.remove();
    img.remove();
    frame.insertAdjacentHTML("beforeend",
      `<div class="fallback">${cat.emoji}</div>`);
  };
  img.src = `https://cataas.com/cat/${cat.tag}?width=600&t=${Date.now()}`;
}

function shortShareText(cat) {
  return `CAT-SCAN 3000 diagnosis: I am ${cat.name} ${cat.emoji} — "${cat.tagline}" Get scanned: ${QUIZ_URL}`;
}

function fullShareText(cat) {
  return [
    "CAT-SCAN 3000 // CLASSIFICATION COMPLETE",
    `I am ${cat.name} ${cat.emoji}`,
    `"${cat.tagline}"`,
    "",
    cat.desc,
    "",
    `CLASS TRAITS: ${cat.traits.join(" · ")}`,
    `Get scanned: ${QUIZ_URL}`
  ].join("\n");
}

function copyText(text) {
  const legacy = () => {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.cssText = "position:fixed;top:0;left:0;opacity:0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    let ok = false;
    try { ok = document.execCommand("copy"); } catch (e) {}
    ta.remove();
    return ok;
  };
  const done = ok => showToast(ok ? "COPIED TO CLIPBOARD. GO BRAG." : "COPY FAILED. YOU ARE STILL A GREAT CAT.");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => done(true)).catch(() => done(legacy()));
  } else {
    done(legacy());
  }
}

/* draw a 1080x1920 story-format result card on canvas */
async function buildShareCard(cat) {
  await document.fonts.ready;
  const W = 1080, H = 1920;
  const cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");

  const wrap = (text, x, y, maxW, lineH, font, color, glow) => {
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.shadowColor = glow || "transparent";
    ctx.shadowBlur = glow ? 14 : 0;
    ctx.textAlign = "center";
    const words = text.split(" ");
    let line = "";
    for (const w of words) {
      const probe = line ? line + " " + w : w;
      if (ctx.measureText(probe).width > maxW && line) {
        ctx.fillText(line, x, y); y += lineH; line = w;
      } else line = probe;
    }
    if (line) { ctx.fillText(line, x, y); y += lineH; }
    ctx.shadowBlur = 0;
    return y;
  };

  // screen background + faint center glow
  ctx.fillStyle = "#14100a";
  ctx.fillRect(0, 0, W, H);
  const glow = ctx.createRadialGradient(W / 2, H / 2, 100, W / 2, H / 2, 1100);
  glow.addColorStop(0, "rgba(255,176,0,.07)");
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // frame
  ctx.strokeStyle = "#8f6510";
  ctx.lineWidth = 3;
  ctx.strokeRect(46, 46, W - 92, H - 92);

  // header
  ctx.textAlign = "center";
  ctx.font = "38px Michroma, sans-serif";
  ctx.fillStyle = "#b9bfc4";
  ctx.fillText("CAT-SCAN 3000", W / 2, 150);
  ctx.font = "20px Michroma, sans-serif";
  ctx.fillStyle = "#7d838a";
  ctx.fillText("FELINE CLASSIFICATION UNIT", W / 2, 195);

  ctx.font = "42px VT323, monospace";
  ctx.fillStyle = "#8f6510";
  ctx.fillText("CLASSIFICATION COMPLETE", W / 2, 300);

  // cat name
  ctx.font = "96px VT323, monospace";
  ctx.fillStyle = "#ffb000";
  ctx.shadowColor = "rgba(255,176,0,.8)";
  ctx.shadowBlur = 26;
  ctx.fillText(`${cat.name} ${cat.emoji}`, W / 2, 415);
  ctx.shadowBlur = 0;

  // specimen photo (reuse the CORS-clean displayed image so it's the same cat)
  const px = 130, py = 480, ps = 820;
  ctx.fillStyle = "#0c0903";
  ctx.fillRect(px, py, ps, ps);
  const img = document.getElementById("cat-photo");
  if (img && img.complete && img.naturalWidth > 0) {
    const s = Math.min(img.naturalWidth, img.naturalHeight);
    const sx = (img.naturalWidth - s) / 2, sy = (img.naturalHeight - s) / 2;
    try { ctx.drawImage(img, sx, sy, s, s, px, py, ps, ps); }
    catch (e) { /* tainted fallback below */ }
  } else {
    ctx.font = "420px serif";
    ctx.fillText(cat.emoji, W / 2, py + ps / 2 + 150);
  }
  ctx.strokeStyle = "#8f6510";
  ctx.lineWidth = 3;
  ctx.strokeRect(px, py, ps, ps);
  ctx.font = "30px VT323, monospace";
  ctx.fillStyle = "#8f6510";
  ctx.textAlign = "left";
  ctx.fillText("LIVE SPECIMEN FEED", px + 8, py - 14);
  ctx.textAlign = "center";

  // stamp
  ctx.save();
  ctx.translate(870, 500);
  ctx.rotate(-.1);
  ctx.strokeStyle = "#ff5a3c";
  ctx.lineWidth = 5;
  ctx.strokeRect(-170, -38, 340, 76);
  ctx.font = "26px Michroma, sans-serif";
  ctx.fillStyle = "#ff5a3c";
  ctx.shadowColor = "rgba(255,90,60,.7)";
  ctx.shadowBlur = 16;
  ctx.fillText("CONFIRMED FELINE", 0, 10);
  ctx.restore();
  ctx.shadowBlur = 0;

  // tagline + analysis + traits
  let y = wrap(`"${cat.tagline}"`, W / 2, 1395, 920, 58, "52px VT323, monospace", "#63e07c", "rgba(99,224,124,.6)");
  y = wrap(cat.desc, W / 2, y + 28, 900, 50, "40px VT323, monospace", "#ffd35c");
  wrap(cat.traits.map(t => `[${t}]`).join("  "), W / 2, y + 30, 900, 44, "34px VT323, monospace", "#8f6510");

  // footer
  ctx.font = "34px VT323, monospace";
  ctx.fillStyle = "#63e07c";
  ctx.fillText(QUIZ_URL.replace("https://", ""), W / 2, H - 90);

  // scanlines + vignette
  ctx.fillStyle = "rgba(0,0,0,.16)";
  for (let ly = 0; ly < H; ly += 6) ctx.fillRect(0, ly, W, 2);
  const vin = ctx.createRadialGradient(W / 2, H / 2, 500, W / 2, H / 2, 1250);
  vin.addColorStop(0, "rgba(0,0,0,0)");
  vin.addColorStop(1, "rgba(0,0,0,.42)");
  ctx.fillStyle = vin;
  ctx.fillRect(0, 0, W, H);

  return new Promise(res => cv.toBlob(res, "image/png"));
}

async function shareCardImage(cat) {
  showToast("RENDERING TRANSMISSION CARD…");
  try {
    const blob = await buildShareCard(cat);
    if (!blob) throw new Error("no blob");
    const file = new File([blob], "cat-scan-result.png", { type: "image/png" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], text: shortShareText(cat) });
    } else {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "cat-scan-result.png";
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
      showToast("CARD DOWNLOADED. POST IT ANYWHERE.");
    }
  } catch (e) {
    if (e.name !== "AbortError") showToast("CARD TRANSMISSION FAILED.");
  }
}

function shareResult(cat) {
  if (crt.querySelector(".sharemenu")) return;
  const encShort = encodeURIComponent(shortShareText(cat));
  const encFull = encodeURIComponent(fullShareText(cat));
  const targets = [
    { label: "▣ SHARE IMAGE CARD (IG & MORE)", act: () => shareCardImage(cat) },
    { label: "𝕏 POST TO X", act: () => window.open(`https://twitter.com/intent/tweet?text=${encShort}`, "_blank", "noopener") },
    { label: "@ POST TO THREADS", act: () => window.open(`https://www.threads.net/intent/post?text=${encShort}`, "_blank", "noopener") },
    { label: "✆ SEND VIA WHATSAPP", act: () => window.open(`https://wa.me/?text=${encFull}`, "_blank", "noopener") },
    { label: "⧉ COPY TRANSMISSION", act: () => copyText(fullShareText(cat)) }
  ];

  const menu = document.createElement("div");
  menu.className = "sharemenu";
  menu.innerHTML = `<div class="line glow">SELECT TRANSMISSION CHANNEL:</div>` +
    targets.map((t, i) => `<button class="term-btn" data-i="${i}">${t.label}</button>`).join("") +
    `<button class="term-btn dim" data-i="-1">✕ ABORT TRANSMISSION</button>`;
  crt.appendChild(menu);
  menu.querySelectorAll("button").forEach(btn => {
    btn.onclick = () => {
      const i = Number(btn.dataset.i);
      if (i >= 0) targets[i].act();
      menu.remove();
    };
  });
}

function bindSwitch(el, handler) {
  el.addEventListener("click", handler);
  el.addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handler(); }
  });
}

/* PWR: the cat does not permit shutdown */
const swPwr = document.getElementById("sw-pwr");
bindSwitch(swPwr, () => {
  if (pwrBusy) return;
  pwrBusy = true;
  const lampPwr = document.getElementById("lamp-pwr");
  swPwr.classList.replace("on", "off");
  swPwr.setAttribute("aria-checked", "false");
  crt.classList.add("off");
  lampPwr.className = "lamp off";
  setTimeout(() => {
    panel.insertAdjacentHTML("beforeend", `<img class="pawpress" src="${PAW_IMG}" alt="">`);
    setTimeout(() => {                 // paw makes contact: power snaps back
      swPwr.classList.replace("off", "on");
      swPwr.setAttribute("aria-checked", "true");
      crt.classList.remove("off");
      lampPwr.className = "lamp on";
      crt.classList.add("glitch");
      setTimeout(() => crt.classList.remove("glitch"), 650);
      showToast("SHUTDOWN OVERRIDDEN. THE CAT REQUIRES AN AUDIENCE.");
    }, 500);
    setTimeout(() => {                 // arm fully retracted
      panel.querySelector(".pawpress")?.remove();
      pwrBusy = false;
    }, 1700);
  }, 900);
});

/* LASER: deploy the pointer, destroy all focus */
const swLaser = document.getElementById("sw-laser");
bindSwitch(swLaser, () => {
  const on = !swLaser.classList.contains("on");
  swLaser.classList.toggle("on", on);
  swLaser.classList.toggle("off", !on);
  swLaser.setAttribute("aria-checked", String(on));
  document.getElementById("lamp-laser").className = on ? "lamp amb" : "lamp off";
  if (on) {
    crt.insertAdjacentHTML("beforeend", `<div class="laser-dot" style="left:50%;top:50%"></div>`);
    const dot = crt.querySelector(".laser-dot");
    const dart = () => {
      dot.style.transitionDuration = (0.25 + Math.random() * 0.5) + "s";
      dot.style.left = (6 + Math.random() * 86) + "%";
      dot.style.top = (6 + Math.random() * 86) + "%";
    };
    dart();
    laserTimer = setInterval(dart, 700);
    showToast("LASER DEPLOYED. FOCUS IS NO LONGER POSSIBLE.");
  } else {
    clearInterval(laserTimer);
    laserTimer = null;
    crt.querySelector(".laser-dot")?.remove();
    showToast("LASER STOWED. THE RED DOT WAS NEVER REAL.");
  }
});

const swDog = document.getElementById("sw-dog");
bindSwitch(swDog, () => {
  if (dogBusy) return;
  dogBusy = true;
  swDog.classList.replace("off", "on");
  swDog.setAttribute("aria-checked", "true");
  const lampDog = document.getElementById("lamp-dog");
  lampDog.className = "lamp red";
  crt.insertAdjacentHTML("beforeend", `
    <div class="dogalert" role="alert">
      <div class="line alert">⚠ DOG MODE REQUEST DENIED ⚠</div>
      <div class="line alert">THIS UNIT CLASSIFIES CATS ONLY.</div>
      <div class="line dim">WOOF DETECTED: FALSE</div>
      <div class="line dim">INCIDENT LOGGED. SHAME LEVEL: HIGH.</div>
    </div>`);
  setTimeout(() => {
    crt.querySelector(".dogalert")?.remove();
    swDog.classList.replace("on", "off");
    swDog.setAttribute("aria-checked", "false");
    lampDog.className = "lamp off";
    showToast("DOG MODE PERMANENTLY UNAVAILABLE.");
    dogBusy = false;
  }, 3200);
});

const knob = document.getElementById("knob");
function setChaos(value) {
  chaos = Math.min(1, Math.max(0, value));
  const rot = chaos * 260 - 130;
  knob.style.setProperty("--rot", rot + "deg");
  knob.setAttribute("aria-valuenow", String(Math.round(chaos * 100)));
  crt.dataset.chaos = chaos < .25 ? "0" : chaos > .75 ? "2" : "1";
}
setChaos(chaos);

knob.addEventListener("pointerdown", e => {
  e.preventDefault();
  knob.setPointerCapture(e.pointerId);
  const move = ev => {
    const r = knob.getBoundingClientRect();
    const dx = ev.clientX - (r.left + r.width / 2);
    const dy = ev.clientY - (r.top + r.height / 2);
    let deg = Math.atan2(dx, -dy) * 180 / Math.PI;   // 0 = up
    deg = Math.min(130, Math.max(-130, deg));
    setChaos((deg + 130) / 260);
  };
  const up = () => {
    knob.removeEventListener("pointermove", move);
    knob.removeEventListener("pointerup", up);
    if (chaos >= .9) showToast("WARNING: MAXIMUM CHAOS. RESULTS MAY SKEW FERAL.");
  };
  knob.addEventListener("pointermove", move);
  knob.addEventListener("pointerup", up);
  move(e);
});
knob.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === "ArrowUp") { e.preventDefault(); setChaos(chaos + .1); }
  if (e.key === "ArrowLeft" || e.key === "ArrowDown") { e.preventDefault(); setChaos(chaos - .1); }
});

renderIntro();
</script>
</body>
